name: CI Check

on: [push, pull_request]

jobs:
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier Check
        run: npm run format:check 

      - name: Lint Check
        run: npm run lint
        env: 
          ESLINT_USE_FLAT_CONFIG: false

      - name: Build
        run: npm run build